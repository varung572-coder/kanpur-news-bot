name: Kanpur News Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '30 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install packages
        run: pip install feedparser requests pytz

      - name: Run News Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python - << 'EOF'
          import feedparser
          import requests
          import os
          import json
          from datetime import datetime, timedelta
          import pytz

          token = os.getenv("BOT_TOKEN")
          chat_id = os.getenv("CHAT_ID")

          if not token or not chat_id:
              print("❌ ERROR: Secrets missing!")
              exit(1)

          # IST TIME
          ist = pytz.timezone("Asia/Kolkata")
          now = datetime.now(ist).strftime("%d %b, %I:%M %p")

          # FILE SETUP
          file_path = "sent_news.json"

          if not os.path.exists(file_path):
              with open(file_path, "w") as f:
                  json.dump([], f)

          with open(file_path, "r") as f:
              old_news = set(json.load(f))

          sources = [
              "https://news.google.com/rss/search?q=kanpur&hl=en-IN&gl=IN&ceid=IN:en",
              "https://news.google.com/rss/search?q=कानपुर&hl=hi-IN&gl=IN&ceid=IN:hi"
          ]

          all_news = []
          new_seen = set()

          for url in sources:
              feed = feedparser.parse(url)

              for item in feed.entries:
                  title = item.title.strip()
                  link = item.link.strip()

                  # REMOVE DUPLICATES
                  if title in old_news or title in new_seen:
                      continue

                  # ONLY RECENT (6 HOURS)
                  if hasattr(item, 'published_parsed'):
                      pub_time = datetime(*item.published_parsed[:6])
                      if datetime.utcnow() - pub_time > timedelta(hours=6):
                          continue

                  new_seen.add(title)
                  all_news.append((title, link))

          url = f"https://api.telegram.org/bot{token}/sendMessage"

          # ✅ IF NO NEWS → SEND MESSAGE
          if not all_news:
              message = f"🗞️ *KANPUR NEWS*\n⏰ {now}\n\n⚠️ No new news found right now.\nPlease check again later."

              payload = {
                  "chat_id": chat_id,
                  "text": message,
                  "parse_mode": "Markdown"
              }

              r = requests.post(url, data=payload)
              print(f"Telegram Status: {r.status_code}")

          else:
              message = f"🗞️ *KANPUR NEWS*\n⏰ {now}\n\n"

              for i, (title, link) in enumerate(all_news, 1):
                  message += f"{i}. {title}\n🔗 [Read More]({link})\n\n"

              payload = {
                  "chat_id": chat_id,
                  "text": message,
                  "parse_mode": "Markdown",
                  "disable_web_page_preview": True
              }

              r = requests.post(url, data=payload)
              print(f"Telegram Status: {r.status_code}")

              if r.status_code == 200:
                  print("✅ Message sent!")

                  # SAVE SENT NEWS
                  updated_news = list(old_news.union(new_seen))
                  with open(file_path, "w") as f:
                      json.dump(updated_news, f)

              else:
                  print(f"❌ Failed: {r.text}")
          EOF

      - name: Commit sent news database
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

           git pull origin main

          if [ -f sent_news.json ]; then
            git add sent_news.json
            git commit -m "Update sent news" || echo "No changes"
            git push origin main
          else
            echo "No file found, skipping commit"
          fi
