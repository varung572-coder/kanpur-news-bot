name: Kanpur News Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '30 */3 * * *'
    workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages
        run: pip install feedparser requests

      - name: Run News Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python - << 'EOF'
          import feedparser
          import requests
          import os
          from datetime import datetime

          token = os.getenv("BOT_TOKEN")
          chat_id = os.getenv("CHAT_ID")

          if not token or not chat_id:
              print("❌ ERROR: Secrets (BOT_TOKEN or CHAT_ID) are missing!")
              exit(1)

          sources = [
              "https://news.google.com/rss/search?q=kanpur&hl=en-IN&gl=IN&ceid=IN:en",
              "https://news.google.com/rss/search?q=कानपुर&hl=hi-IN&gl=IN&ceid=IN:hi"
          ]

          all_news = []
          seen = set()

          for url in sources:
              feed = feedparser.parse(url)
              for item in feed.entries[:5]:
                  title = item.title.strip()
                  link = item.link.strip()
                  if link not in seen:
                      seen.add(link)
                      all_news.append((title, link))

          if not all_news:
              print("ℹ️ No news found right now.")
          else:
              now = datetime.now().strftime("%d %b, %I:%M %p")
              message = f"🗞️ *KANPUR NEWS*\n⏰ {now}\n\n"
              for i, (title, link) in enumerate(all_news[:8], 1):
                  message += f"{i}. {title}\n🔗 [Read More]({link})\n\n"
              
              url = f"https://api.telegram.org/bot{token}/sendMessage"
              payload = {"chat_id": chat_id, "text": message, "parse_mode": "Markdown"}
              r = requests.post(url, data=payload)
              
              print(f"Telegram Status: {r.status_code}")
              if r.status_code == 200:
                  print("✅ Message sent successfully!")
              else:
                  print(f"❌ Failed: {r.text}")
          EOF
