name: Kanpur News Bot

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages
        run: pip install feedparser requests

      - name: Run News Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python << EOF
          import feedparser
          import requests
          from datetime import datetime

          BOT_TOKEN = "${{ secrets.BOT_TOKEN }}"
          CHAT_ID = "${{ secrets.CHAT_ID }}"

          sources = [
              "https://news.google.com/rss/search?q=kanpur&hl=en-IN&gl=IN&ceid=IN:en",
              "https://news.google.com/rss/search?q=कानपुर&hl=hi-IN&gl=IN&ceid=IN:hi"
          ]

          all_news = []
          seen = set()

          for url in sources:
              feed = feedparser.parse(url)
              for item in feed.entries[:8]:
                  title = item.title.strip()
                  link = item.link.strip()
                  if link in seen or not title:
                      continue
                  seen.add(link)
                  all_news.append((title, link))

          if not all_news:
              print("No news found")
          else:
              now = datetime.now().strftime("%d %b %Y, %I:%M %p")
              message = f"🗞️ KANPUR NEWS DIGEST\n🕐 {now}\n📊 {len(all_news)} stories\n\n"
              for i, (title, link) in enumerate(all_news[:10], 1):
                  message += f"{i}. {title}\n🔗 {link}\n\n"
              message += "#Kanpur #KanpurNews"

              url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"
              data = {"chat_id": CHAT_ID, "text": message}
              r = requests.post(url, data=data)

              print("Status:", r.status_code)
              if r.status_code == 200:
                  print("✅ Sent!")
              else:
                  print("Failed")
          EOF
